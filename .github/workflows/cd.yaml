name: CD Workflow

on: 
    workflow_run:
        workflows: ["CI Workflow"] 
        types: [completed]

jobs:
    deploy:
        runs-on: ubuntu-latest
        steps:
            - uses: actions/checkout@v4 # this happens in the runner

            - name: Execute remote SSH commands using password
              uses: appleboy/ssh-action@v1
              with:
                  host: ${{ secrets.HOST }}
                  username: ${{ secrets.EC2_USER }}
                  key: ${{ secrets.EC2_SSH_KEY }}
                  script: |
                    if [ ! -d "$HOME/github-actions-demo" ]; then
                      git clone https://github.com/ja983/github-actions-demo.git $HOME/github-actions-demo
                    fi
                    
                    cd ~/github-actions-demo
                    git pull origin main
                    docker compose pull
                    docker compose down && docker compose up -d